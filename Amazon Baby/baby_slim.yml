
experiment:
  dataset: amazon_music

  data_config:
    strategy: dataset
    dataset_path: C:/Users/admin/Documents/Study/Master/Dissertation/Dataset/baby_interaction.tsv 
  binarize: True

  prefiltering:
  - strategy: iterative_k_core
    core: 5

  splitting:
    test_splitting:
      strategy: temporal_hold_out
      test_ratio: 0.2

  top_k: 50

  evaluation:
    cutoffs: [10,20,50]
    simple_metrics: [nDCG, Recall, HR, Precision, MAP, MRR]

  gpu: -1

  models:
    Slim:
        meta:
            verbose: True
            save_recs: True
        l1_ratio: 0.001
        alpha: 0.01
        neighborhood: 100
