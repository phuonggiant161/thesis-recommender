
experiment:
  dataset: amazon_baby_2022

  data_config:
    strategy: dataset
    dataset_path: C:/Users/admin/Documents/Study/Master/Dissertation/dataset.tsv

    side_information:
      - dataloader: ItemAttributes
        attribute_file: C:/Users/admin/Documents/Study/Master/Dissertation/item_attributes.tsv

  splitting:
    save_on_disk: True
    save_folder: C:/Users/admin/Documents/Study/Master/Dissertation/Dataset/splitting/

    test_splitting:
      strategy: temporal_hold_out
      test_ratio: 0.2

  top_k: 50

  evaluation:
    cutoffs: [10, 20, 50]
    simple_metrics: [nDCG, Recall, HR, Precision, MAP, MRR]

  gpu: -1

  models:
    VSM:
      meta:
        save_recs: True
        verbose: True
      similarity: cosine
      user_profile: tfidf
      item_profile: tfidf

